  <text x="149" y="224" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#15803D" font-weight="600">🕐 Scheduled — GitHub Actions (pg-tracker repo)</text>

  <!-- ══════ DATA SOURCES [scheduled] ══════ -->

  <!-- publicgold.com.my [row 2] -->
  <rect x="20" y="240" width="230" height="76" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="135" y="263" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#4C1D95">publicgold.com.my</text>
