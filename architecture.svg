  <text x="435" y="119" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="700" fill="#1E3A8A">Vercel Edge Function</text>
  <text x="435" y="137" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#1D4ED8">/api/pg-prices.js</text>
  <text x="435" y="154" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#2563EB">curl_cffi Chrome impersonation</text>
  <text x="435" y="170" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#2563EB">Cache-Control: no-store</text>

