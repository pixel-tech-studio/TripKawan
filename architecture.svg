  <text x="435" y="282" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#166534">pg-tracker repository</text>
  <line x1="335" y1="293" x2="535" y2="293" stroke="#86EFAC" stroke-width="1"/>

  <text x="435" y="309" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="700" fill="#15803D">⏰ Every 20 min  (*/20 * * * *)</text>
  <text x="435" y="326" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#166534">hourly_scrape.py</text>
  <text x="435" y="343" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#166534">scrape_pg_prices()</text>
  <text x="435" y="360" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#166534">fetch_market_data()</text>
