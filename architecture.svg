  <line x1="550" y1="138" x2="883" y2="138" stroke="#64748B" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <text x="716" y="128" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#94A3B8">JSON · no cache</text>

