  <text x="135" y="143" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#6D28D9">GAP &amp; SAP sell prices</text>
  <text x="135" y="161" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#7C3AED">server-side rendered HTML</text>

