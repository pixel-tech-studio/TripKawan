  <text x="435" y="454" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#166534">scrape_pg_prices()</text>
  <text x="435" y="471" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#166534">fetch_market_data()</text>
