  <text x="1107" y="374" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#C9A227">Range: 1M / 3M / 6M / 1Y / All  ·  MYR or USD  ·  /g or /oz</text>
