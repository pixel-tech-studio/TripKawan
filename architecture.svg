  <text x="745" y="67" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="700" letter-spacing="1.2" fill="#94A3B8">STORAGE</text>
  <text x="1107" y="67" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="700" letter-spacing="1.2" fill="#94A3B8">BROWSER (tripkawan.my/gold)</text>

