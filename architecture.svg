  <text x="1107" y="134" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#92400E">GAP · SAP · Spot Gold · Spot Silver · USD/MYR</text>
  <text x="1107" y="152" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#92400E">Current value + day-over-day delta · MYR or USD · /g or /oz</text>
  <text x="1107" y="170" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#C9A227">Fetched fresh on every page load</text>

